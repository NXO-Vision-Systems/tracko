name: Build iOS App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build unsigned IPA
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps || npm install --legacy-peer-deps

      - name: Create dummy out folder
        run: mkdir -p out

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Build Xcode Project
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -configuration Release \
                     -sdk iphoneos \
                     -destination 'generic/platform=iOS' \
                     CODE_SIGNING_ALLOWED=NO \
                     CODE_SIGNING_REQUIRED=NO \
                     clean build
                     
      - name: Package IPA
        run: |
          mkdir -p Payload
          # Find the built .app file in the Build/Products directory
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "App.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App.app not found!"
            exit 1
          fi
          echo "Found App.app at: $APP_PATH"
          cp -r "$APP_PATH" Payload/Tracko.app
          zip -r Tracko.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tracko-IPA
          path: Tracko.ipa
